<body>
Reports resource paths in FXML files that point to non-existent files.
<p>
Checks <code>&lt;Image url="@..."/&gt;</code>,
<code>&lt;fx:include source="..."/&gt;</code>,
and <code>&lt;URL value="@..."/&gt;</code> paths.
</p>
<!-- tooltip end -->
<p>Paths starting with <code>@</code> are resolved relative to the FXML file location.</p>
</body>
